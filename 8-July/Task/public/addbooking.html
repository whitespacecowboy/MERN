<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booking</title>
</head>
<body>
    <a href="index.html">back</a>
   <form action="/add" method="POST">
        <label for="bookingId">Booking Id</label>
        <input type="text" id="booking_id" name="bookingId" required> <br>

        <label for="customerName">Customer Name </label>
        <input type="text" id="customer_name" name="customerName" required> <br>

        <label for="movieName">Movie Name</label>
        <input type="text" id="movie_name" name="movieName" required> <br>

        <label for="showTime">Show Time</label>
        <input type="time" id="show_time" name="showTime" required> <br>

        <label for="seatNo">Seat Number</label>
        <input type="string" id="seatNo" name="seatNo" value="Eg. A10" required> <br>

        <label for="ticketPrice">Price</label>
        <input type="number" id="price" name="ticketPrice" required> <br>

        <input type="submit" value="Submit">
   </form> 
</body>
</html>
